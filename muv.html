<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Muv Delivery</title>

<link rel="stylesheet" href="muv.css">

</head>

<body>

<header>

<div class="logo">
<h1> MUV </h1>
</div>

<input type="text" placeholder="Buscar restaurantes ou comidas...">

</header>


<section class="pontos">

<h2>Seus Muv Points</h2>

<p id="pontuacao">120 pontos</p>

<button onclick="trocar()">Trocar pontos por comida</button>

</section>


<section class="categorias">

<h2>Categorias</h2>

<div class="categoria-container">

<button>🍔 Lanches</button>
<button>🍕 Pizza</button>
<button>🍣 Japonês</button>
<button>🥗 Saudável</button>
<button>🍰 Sobremesas</button>

</div>

</section>


<section class="promo">

<h2>Promoções do dia</h2>

<div class="cards">

<div class="card">

<h3>Hamburguers </h3>
<p>50% OFF no segundo lanche</p>

</div>

<div class="card">

<h3>Pizzas</h3>
<p>Frete grátis hoje</p>

</div>

<div class="card">

<h3>Comida Japonesa</h3>
<p>Combo com desconto</p>

</div>

</div>

</section>


<footer>

<button onclick="home()">🏠 Home</button>

<button onclick="pedidos()">📦 Pedidos</button>

<button onclick="pontos()">⭐ Pontos</button>

<button onclick="perfil()">👤 Perfil</button>

</footer>


<script src="muv.js"></script>

</body>
</html>
